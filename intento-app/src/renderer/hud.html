<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Intento HUD</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            background: transparent;
            overflow: hidden;
            height: 100vh;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .hud-badge {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hud-icon {
            font-size: 16px;
        }

        .hud-text {
            color: white;
            font-size: 13px;
            font-weight: 500;
            opacity: 0.9;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        .hud-badge {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>

<body>
    <div class="hud-badge">
        <span class="hud-icon">🧠</span>
        <span class="hud-text" id="hudText">Ready</span>
    </div>
    <script>
        const { ipcRenderer } = require('electron');
        const hudText = document.getElementById('hudText');

        ipcRenderer.on('hud:update', (_event, text) => {
            hudText.textContent = text;
        });
    </script>
</body>

</html>
